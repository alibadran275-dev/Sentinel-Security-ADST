<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel - Security Code Sandbox & ADST</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 2px solid #0ea5e9;
      padding: 20px 0;
      margin-bottom: 30px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 28px;
      color: #0ea5e9;
      margin-bottom: 5px;
    }

    header p {
      color: #94a3b8;
      font-size: 14px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    @media (max-width: 768px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: #0ea5e9;
      box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
    }

    .card h2 {
      font-size: 18px;
      color: #0ea5e9;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vulnerability-item {
      background: rgba(15, 23, 42, 0.5);
      border-left: 4px solid #ef4444;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 4px;
    }

    .severity-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 8px;
    }

    .severity-critical {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .severity-high {
      background: rgba(251, 146, 60, 0.2);
      color: #fdba74;
    }

    .score {
      color: #fbbf24;
      font-weight: bold;
      margin-top: 8px;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .file-item {
      background: rgba(15, 23, 42, 0.5);
      padding: 12px;
      border-radius: 4px;
      border-left: 4px solid #10b981;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .file-item:hover {
      background: rgba(15, 23, 42, 0.8);
      border-left-color: #0ea5e9;
    }

    .file-name {
      font-weight: bold;
      color: #e2e8f0;
    }

    .file-size {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 4px;
    }

    .code-viewer {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .code-viewer h2 {
      color: #0ea5e9;
      margin-bottom: 15px;
    }

    pre {
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }

    code {
      font-family: 'Courier New', monospace;
      color: #e2e8f0;
    }

    .attack-tree {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .attack-tree h2 {
      color: #0ea5e9;
      margin-bottom: 15px;
    }

    .tree-node {
      margin-left: 20px;
      padding: 10px;
      border-left: 2px solid #0ea5e9;
      margin-bottom: 10px;
    }

    .tree-node.attack {
      border-left-color: #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }

    .tree-node.remediation {
      border-left-color: #10b981;
      background: rgba(16, 185, 129, 0.05);
    }

    .tree-label {
      color: #94a3b8;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .tree-content {
      color: #e2e8f0;
    }

    button {
      background: #0ea5e9;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #0284c7;
      transform: translateY(-2px);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #334155;
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      color: #86efac;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 22px;
      }

      .card {
        padding: 15px;
      }

      .container {
        padding: 10px;
      }

      pre {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>Sentinel™</h1>
      <p>Application Security Code Sandbox & Attack Simulation Tree (ADST)</p>
    </div>
  </header>

  <div class="container">
    <div class="dashboard">
      <div class="card">
        <h2>Vulnerabilities Detected</h2>
        <div id="vulnerabilities-list" class="loading">
          <div class="spinner"></div>
        </div>
      </div>

      <div class="card">
        <h2>Target Files</h2>
        <div id="files-list" class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <div id="code-viewer" style="display: none;" class="code-viewer">
      <h2>Source Code: <span id="code-filename"></span></h2>
      <pre><code id="code-content"></code></pre>
    </div>

    <div id="attack-tree" style="display: none;" class="attack-tree">
      <h2>Attack Simulation Tree</h2>
      <div id="tree-content"></div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    async function loadVulnerabilities() {
      try {
        const response = await fetch(`${API_BASE}/vulnerabilities`);
        const data = await response.json();
        
        const container = document.getElementById('vulnerabilities-list');
        container.innerHTML = '';
        
        data.vulnerabilities.forEach(vuln => {
          const item = document.createElement('div');
          item.className = 'vulnerability-item';
          item.style.cursor = 'pointer';
          item.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: start;">
              <div style="flex: 1;">
                <div style="font-weight: bold; color: #e2e8f0;">${vuln.name}</div>
                <div style="font-size: 12px; color: #94a3b8; margin-top: 4px;">${vuln.description}</div>
                <div class="score">Score: ${vuln.score}</div>
              </div>
              <span class="severity-badge severity-${vuln.severity.toLowerCase()}">${vuln.severity}</span>
            </div>
          `;
          item.onclick = () => loadVulnerabilityDetails(vuln.id);
          container.appendChild(item);
        });
      } catch (error) {
        document.getElementById('vulnerabilities-list').innerHTML = `<div class="error">Error loading vulnerabilities: ${error.message}</div>`;
      }
    }

    async function loadVulnerabilityDetails(id) {
      try {
        const response = await fetch(`${API_BASE}/vulnerability/${id}`);
        const data = await response.json();
        
        const treeContent = document.getElementById('tree-content');
        treeContent.innerHTML = `
          <div class="tree-node attack">
            <div class="tree-label">Attack Path</div>
            <div class="tree-content">
              ${data.attackSteps.map(step => `<div style="margin: 8px 0;">• ${step}</div>`).join('')}
            </div>
          </div>
          <div class="tree-node remediation">
            <div class="tree-label">Remediation</div>
            <div class="tree-content">${data.remediation}</div>
          </div>
          <div class="tree-node">
            <div class="tree-label">CWE Reference</div>
            <div class="tree-content">${data.cwe}</div>
          </div>
        `;
        
        document.getElementById('attack-tree').style.display = 'block';
        document.getElementById('attack-tree').scrollIntoView({ behavior: 'smooth' });
      } catch (error) {
        console.error('Error loading vulnerability details:', error);
      }
    }

    async function loadFiles() {
      try {
        const response = await fetch(`${API_BASE}/files`);
        const data = await response.json();
        
        const container = document.getElementById('files-list');
        container.innerHTML = '';
        
        data.files.forEach(file => {
          const item = document.createElement('div');
          item.className = 'file-item';
          item.innerHTML = `
            <div class="file-name">${file.name}</div>
            <div class="file-size">${file.size} • ${file.vulnerabilities.length} vulnerabilities</div>
          `;
          item.onclick = () => loadSourceCode(file.name);
          container.appendChild(item);
        });
      } catch (error) {
        document.getElementById('files-list').innerHTML = `<div class="error">Error loading files: ${error.message}</div>`;
      }
    }

    function loadSourceCode(filename) {
      const sourceCode = {
        'auth.ts': `/**
 * Authentication Handler - Vulnerable Implementation
 * Training Lab: OWASP Top 10 Security Issues
 */

interface UserProfile {
  id: string;
  username: string;
  email: string;
  role: string;
}

const USER_DATABASE: Record<string, UserProfile> = {
  "user_1001": { id: "user_1001", username: "alice", email: "alice@company.com", role: "standard" },
  "user_1002": { id: "user_1002", username: "bob", email: "bob@company.com", role: "standard" },
  "admin_9999": { id: "admin_9999", username: "admin", email: "admin@company.com", role: "administrator" },
};

export class AuthController {
  
  /**
   * VULNERABILITY: Insecure Direct Object Reference (IDOR)
   * CWE-639: Authorization Bypass Through User-Controlled Key
   */
  async getUserProfile(req: any, res: any) {
    const { userId } = req.query;
    
    if (!userId) {
      return res.status(400).json({ error: "Missing userId parameter" });
    }
    
    const profile = USER_DATABASE[userId];
    if (!profile) {
      return res.status(404).json({ error: "User profile not found" });
    }
    
    return res.json({ status: "success", data: profile });
  }

  /**
   * VULNERABILITY: Open Redirect
   * CWE-601: URL Redirection to Untrusted Site
   */
  async handleLogout(req: any, res: any) {
    const { redirectTo } = req.query;
    
    console.log("Session destroyed.");
    
    if (redirectTo) {
      return res.redirect(redirectTo);
    }
    
    return res.redirect("/dashboard");
  }
}`,
        'payments.ts': `/**
 * Checkout Handler - Vulnerable Implementation
 * Training Lab: Client-Side Validation Bypass
 */

export class CheckoutController {
  
  /**
   * VULNERABILITY: Parameter Tampering - Price Manipulation
   * CWE-434: Unrestricted Upload of File with Dangerous Type
   */
  async processCheckout(req: any, res: any) {
    const { itemId, quantity, singleUnitPrice, currency } = req.body;
    
    const totalAmount = quantity * singleUnitPrice;
    
    console.log(\`Charged: \${totalAmount} \${currency} for item \${itemId}\`);
    return res.json({ success: true, total: totalAmount });
  }
}`
      };

      document.getElementById('code-filename').textContent = filename;
      document.getElementById('code-content').textContent = sourceCode[filename] || 'File not found';
      document.getElementById('code-viewer').style.display = 'block';
      document.getElementById('code-viewer').scrollIntoView({ behavior: 'smooth' });
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      loadVulnerabilities();
      loadFiles();
    });
  </script>
</body>
</html>
